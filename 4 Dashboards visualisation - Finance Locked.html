<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kharon Command - Finance & Integrity</title>
    <script src="https://cdn.tailwindcss.com">
        
        // === FINANCE PORTAL SPECIFIC FEATURES (See KHARON_PORTAL_CAPABILITY_ASSESSMENT.md for implementation) ===
        // TODO: Implement finance portal specific functionality
        
        // === ENHANCED FUNCTIONALITY ===
        
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Enhanced Toast with types
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            // Remove all variant classes
            toast.classList.remove('toast-success', 'toast-error', 'toast-warning', 'toast-info');
            toast.classList.add(`toast-${type}`);
            
            // Set icon based on type
            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            toastIcon.setAttribute('data-lucide', icons[type] || 'shield');
            lucide.createIcons();
            
            toastText.innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        
        // Loading State Management
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        }
        
        // Keyboard Navigation (ESC to close modals)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMobileMenu();
            }
        });
        
        // XSS Protection - Input Sanitization
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }
        
        // Currency Formatter
        function formatCurrency(amount, currency = 'ZAR') {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: currency
            }).format(amount);
        }
        
        // LocalStorage State Persistence
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(`kharon_${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('LocalStorage read error:', e);
                    return defaultValue;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(`kharon_${key}`, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.warn('LocalStorage write error:', e);
                    return false;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(`kharon_${key}`);
                } catch (e) {
                    console.warn('LocalStorage remove error:', e);
                }
            }
        };
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            hideLoading();
            lucide.createIcons();
            
            // Restore state from localStorage if available
            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
        });

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --kharon-gold: #facc15;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--slate-950); 
            color: #f1f5f9;
        }

        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        .sidebar-item-active { 
            background-color: rgba(255, 255, 255, 0.05); 
            color: var(--kharon-gold); 
            border-left: 4px solid var(--kharon-gold); 
        }

        .command-card {
            background-color: var(--slate-900);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .command-card:hover {
            border-color: rgba(250, 204, 21, 0.3);
            transform: translateY(-2px);
            background-color: #161e2e;
        }

        .modal-bg { background-color: rgba(2, 6, 23, 0.95); backdrop-filter: blur(12px); }
        
        input, select, textarea { 
            outline: none; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 0.75rem; 
            padding: 1rem; 
            width: 100%; 
            background-color: var(--slate-800);
            color: white;
            font-size: 14px;
        }
        
        input:focus { border-color: var(--kharon-gold); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--slate-950); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .currency-pos { color: #4ade80; }
        .currency-neg { color: #f87171; }
        
        .ledger-row:nth-child(even) { background-color: rgba(255,255,255,0.02); }
    
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(250, 204, 21, 0.1);
            border-top-color: var(--kharon-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Variants */
        .toast-success { border-left: 4px solid #22c55e; }
        .toast-error { border-left: 4px solid #ef4444; }
        .toast-warning { border-left: 4px solid #f59e0b; }
        .toast-info { border-left: 4px solid #3b82f6; }

        /* Mobile Navigation */
        .mobile-menu-btn {
            display: none;
        }
        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(4px);
            z-index: 30;
        }
        @media (max-width: 1024px) {
            .mobile-menu-btn {
                display: flex;
            }
            #sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                width: 85%;
                max-width: 320px;
                transition: left 0.3s ease-out;
            }
            #sidebar.open {
                left: 0;
            }
            .mobile-overlay.active {
                display: block;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .empty-state i {
            opacity: 0.3;
            margin-bottom: 1rem;
        }

    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="app" class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-80 bg-slate-900 border-r border-white/5 flex flex-col p-6 z-20 shadow-2xl overflow-y-auto">
            <div class="flex items-center justify-between mb-10 pb-8 border-b border-white/5">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-yellow-400 rounded-2xl flex items-center justify-center text-slate-900 shadow-lg shadow-yellow-400/20" aria-hidden="true">
                        <i data-lucide="shield"></i>
                    </div>
                    <div>
                        <h1 class="font-black tracking-tighter text-xl uppercase leading-none text-white">Kharon</h1>
                        <p class="text-[10px] uppercase tracking-[0.2em] text-white/30 font-bold mt-1">Client Command</p>
                    </div>
                </div>
                <button class="mobile-menu-btn lg:hidden p-2 text-white/60 hover:text-white" onclick="toggleMobileMenu()" aria-label="Toggle navigation menu">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
                <div class="w-12 h-12 bg-yellow-400 rounded-2xl flex items-center justify-center text-slate-950 shadow-lg shadow-yellow-400/20">

                </div>
                <div>
                    <h1 class="font-black tracking-tighter text-xl uppercase leading-none text-white">Kharon</h1>

            <nav id="nav-items" class="flex-1 space-y-2 pr-2"></nav>

                    <span id="target-label" class="text-yellow-400">R120,000</span>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-slate-950 relative">

                <div>
                    <div id="breadcrumb" class="text-[10px] text-white/20 uppercase tracking-[0.3em] font-black mb-1 flex items-center gap-2">
                        <span>Finance Oversight</span> <i data-lucide="chevron-right" class="w-3 h-3"></i> <span id="current-page-crumb">Dashboard</span>

                </div>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p class="text-xs font-black text-white leading-none mb-1 font-bold italic">Kharon Finance</p>
                        <p id="user-role-label" class="text-[10px] text-white/30 font-bold uppercase tracking-widest">Finance Lead</p>
                    </div>

            <div id="content-area" class="p-10 animate-in"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center hidden p-6">
        <div class="modal-bg absolute inset-0" onclick="closeModal()"></div>
        <div class="bg-slate-900 border border-white/10 rounded-[2rem] w-full max-w-4xl p-10 relative shadow-2xl animate-in overflow-y-auto max-h-[90vh]" id="modal-content"></div>
    </div>

    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 border border-white/10 text-white px-8 py-5 rounded-2xl shadow-2xl transition-all transform translate-y-20 opacity-0 z-[60] flex items-center gap-4">
        <i data-lucide="landmark" class="w-4 h-4 text-yellow-400"></i>
        <span id="toast-text" class="font-bold text-sm uppercase tracking-widest font-black italic">Financial Sync Active</span>
    </div>

    <script>
        const state = {
            quotes: [
                { id: 'KH-Q-2041', client: 'Global Logistics', site: 'Control Room', type: 'SANS 10139 Repair', val: 8200, status: 'Sent', date: '2024-04-10' },
                { id: 'KH-Q-2042', client: 'Industrial A', site: 'Substation 4', type: 'SANS 14520 Install', val: 45000, status: 'Draft', date: '2024-04-15' },
                { id: 'KH-Q-2043', client: 'Medical Centre', site: 'ICU Ward', type: 'SANS 10139 Service', val: 3300, status: 'Sent', date: '2024-04-18' }
            ],
            invoices: [
                { id: 'INV-1001', client: 'Global Logistics', site: 'Server Room A', val: 4200, status: 'Paid', date: '2023-11-10', quoteRef: 'KH-Q-1992', aging: 0, certReleased: true },
                { id: 'INV-1002', client: 'Industrial A', site: 'Data Center B', val: 12500, status: 'Overdue', date: '2024-02-15', quoteRef: 'KH-Q-1850', aging: 65, certReleased: false },
                { id: 'INV-1003', client: 'Medical Centre', site: 'Emergency Ward', val: 3300, status: 'Pending', date: '2024-04-10', quoteRef: 'KH-Q-2001', aging: 12, certReleased: false }
            ],
            completedUnbilled: [
                { id: 'K-2402', client: 'Global Logistics', site: 'Control Room', val: 8200, tech: 'Anthony', type: 'SANS 10139 Detect', date: '2024-04-22' }
            ],
            expenses: [
                { id: 'EXP-901', item: 'BP Fuel - Van 1', val: 1450, category: 'Fleet', date: '2024-04-20', tax: 189.13 },
                { id: 'EXP-902', item: 'Supplier: Fire-Tec Batteries', val: 3200, category: 'Stock', date: '2024-04-18', tax: 417.39 }
            ],
            currentNav: 0,
            selectedClientId: null
        };

        const navItems = [
            { title: 'Financial Pulse', icon: 'pie-chart', group: 'Summary' },
            { title: 'Quoting Hub', icon: 'file-text', group: 'Functions' },
            { title: 'Invoicing Engine', icon: 'receipt', group: 'Functions' },
            { title: 'Expense Panel', icon: 'trending-down', group: 'Functions' },
            { title: 'Debtors Monitor', icon: 'users', group: 'Analysis' },
            { title: 'Statement Ledger', icon: 'scroll-text', group: 'Analysis' }
        ];

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function setNav(index) {
            state.currentNav = index;
            state.selectedClientId = null;
            render();
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }

        function openModal(html) {
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-container').classList.remove('hidden');
            lucide.createIcons();
        }

        function convertQuoteToInvoice(quoteId) {
            const q = state.quotes.find(x => x.id === quoteId);
            if (!q) return;
            const newInvoice = {
                id: 'INV-' + (1000 + state.invoices.length + 1),
                client: q.client, site: q.site, val: q.val,
                status: 'Pending', date: new Date().toISOString().split('T')[0],
                quoteRef: q.id, aging: 0, certReleased: false
            };
            state.invoices.unshift(newInvoice);
            q.status = 'Invoiced';
            showToast(`${newInvoice.id} generated. Cert in Escrow.`);
            render();
        }

        function reconcilePayment(invId) {
            const i = state.invoices.find(x => x.id === invId);
            if (i) {
                i.status = 'Paid';
                i.certReleased = true;
                showToast(`Payment Reconciled. SANS Cert Released.`);
                render();
            }
        }

        function render() {
            const currentItem = navItems[state.currentNav];
            document.getElementById('portal-title').innerText = currentItem.title;
            document.getElementById('current-page-crumb').innerText = currentItem.title;

            document.getElementById('nav-items').innerHTML = navItems.map((item, i) => `
                ${(i === 0 || navItems[i-1].group !== item.group) ? `<p class="text-[9px] font-black uppercase text-white/20 mt-6 mb-2 px-5 tracking-widest">${item.group}</p>` : ''}
                <button onclick="setNav(${i})" class="w-full flex items-center justify-between px-5 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-[0.15em] transition-all ${state.currentNav === i ? 'sidebar-item-active shadow-lg' : 'text-white/30 hover:bg-white/5 hover:text-white/60'}">
                    <div class="flex items-center gap-4"><i data-lucide="${item.icon}" class="w-4 h-4"></i><span>${item.title}</span></div>
                </button>
            `).join('');

            const totalInvoiced = state.invoices.reduce((a, b) => a + b.val, 0);
            const target = 120000;
            const pct = Math.min(100, Math.round((totalInvoiced / target) * 100));
            document.getElementById('target-bar').style.width = pct + '%';

            const content = document.getElementById('content-area');
            content.innerHTML = renderModule(state.currentNav);
            lucide.createIcons();
        }

        function renderModule(index) {
            switch(index) {
                case 0: return renderFinancePulse();
                case 1: return renderQuotingHub();
                case 2: return renderInvoicingEngine();
                case 3: return renderExpensePanel();
                case 4: return renderDebtorsMonitor();
                case 5: return renderStatementLedger();
                default: return '';
            }
        }

        function renderFinancePulse() {
            const totalProjected = state.quotes.filter(q => q.status !== 'Invoiced').reduce((a, b) => a + b.val, 0) + state.invoices.filter(i=>i.status !== 'Paid').reduce((a,b)=>a+b.val,0);
            const overdue = state.invoices.filter(i => i.status === 'Overdue').reduce((a, b) => a + b.val, 0);
            const billedMonth = state.invoices.reduce((a, b) => a + b.val, 0);
            const expenses = state.expenses.reduce((a, b) => a + b.val, 0);
            
            const outputVAT = billedMonth * 0.15;
            const inputVAT = state.expenses.reduce((a, b) => a + b.tax, 0);

            return `
                <div class="space-y-10 animate-in">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        ${renderStat('Pipeline Value', 'R' + totalProjected.toLocaleString(), 'trending-up', 'text-yellow-400')}
                        ${renderStat('Arrears (Debt)', 'R' + overdue.toLocaleString(), 'alert-octagon', 'text-red-500')}
                        ${renderStat('Gross Billed', 'R' + billedMonth.toLocaleString(), 'check-circle', 'text-green-500')}
                        ${renderStat('Site Margins', '74%', 'zap', 'text-blue-400')}
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div class="lg:col-span-8 command-card p-10">
                            <h3 class="text-xs font-black uppercase tracking-widest text-white/30 mb-10 flex items-center gap-3"><i data-lucide="activity" class="w-4 h-4"></i> Finance Integrity Watch</h3>
                            <div class="space-y-6">
                                <div class="p-6 bg-slate-950 border border-white/5 rounded-2xl flex justify-between items-center">
                                    <div><h4 class="font-bold text-white/80 uppercase tracking-tighter italic">SANS Certs in Escrow</h4><p class="text-[10px] text-white/20 uppercase font-black mt-1">Legally held until invoice settlement confirmed</p></div>
                                    <p class="text-2xl font-black text-red-400">${state.invoices.filter(i=>!i.certReleased).length} Locked</p>
                                </div>
                                <div class="p-6 bg-green-500/5 border border-green-500/10 rounded-2xl flex justify-between items-center">
                                    <div><h4 class="font-bold text-green-500 uppercase tracking-tighter">VAT Pulse (SARS Readiness)</h4><p class="text-[10px] text-white/20 uppercase font-black mt-1">Output (R${outputVAT.toLocaleString()}) vs Input (R${inputVAT.toLocaleString()})</p></div>
                                    <p class="text-2xl font-black text-green-500">R${(outputVAT - inputVAT).toLocaleString()} Liability</p>
                                </div>
                            </div>
                        </div>
                        <div class="lg:col-span-4 command-card p-10 flex flex-col justify-center text-center space-y-6 bg-yellow-400/5 border border-yellow-400/10">

        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Enhanced Toast with types
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            // Remove all variant classes
            toast.classList.remove('toast-success', 'toast-error', 'toast-warning', 'toast-info');
            toast.classList.add(`toast-${type}`);
            
            // Set icon based on type
            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            toastIcon.setAttribute('data-lucide', icons[type] || 'shield');
            lucide.createIcons();
            
            toastText.innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        
        // Loading State Management
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        }
        
        // Keyboard Navigation (ESC to close modals)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMobileMenu();
            }
        });
        
        // XSS Protection - Input Sanitization
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }
        
        // Currency Formatter
        function formatCurrency(amount, currency = 'ZAR') {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: currency
            }).format(amount);
        }
        
        // LocalStorage State Persistence
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(`kharon_${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('LocalStorage read error:', e);
                    return defaultValue;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(`kharon_${key}`, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.warn('LocalStorage write error:', e);
                    return false;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(`kharon_${key}`);
                } catch (e) {
                    console.warn('LocalStorage remove error:', e);
                }
            }
        };
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            hideLoading();
            lucide.createIcons();
            
            // Restore state from localStorage if available
            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
        });

    </script>
