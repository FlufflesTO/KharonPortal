    <script src="https://cdn.tailwindcss.com">
        
        // === DISPATCH PORTAL SPECIFIC FEATURES (See KHARON_PORTAL_CAPABILITY_ASSESSMENT.md for implementation) ===
        // TODO: Implement dispatch portal specific functionality
        
        // === ENHANCED FUNCTIONALITY ===
        
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Enhanced Toast with types
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            // Remove all variant classes
            toast.classList.remove('toast-success', 'toast-error', 'toast-warning', 'toast-info');
            toast.classList.add(`toast-${type}`);
            
            // Set icon based on type
            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            toastIcon.setAttribute('data-lucide', icons[type] || 'shield');
            lucide.createIcons();
            
            toastText.innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        
        // Loading State Management
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        }
        
        // Keyboard Navigation (ESC to close modals)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMobileMenu();
            }
        });
        
        // XSS Protection - Input Sanitization
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }
        
        // Currency Formatter
        function formatCurrency(amount, currency = 'ZAR') {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: currency
            }).format(amount);
        }
        
        // LocalStorage State Persistence
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(`kharon_${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('LocalStorage read error:', e);
                    return defaultValue;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(`kharon_${key}`, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.warn('LocalStorage write error:', e);
                    return false;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(`kharon_${key}`);
                } catch (e) {
                    console.warn('LocalStorage remove error:', e);
                }
            }
        };
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            hideLoading();
            lucide.createIcons();
            
            // Restore state from localStorage if available
            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
        });

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --kharon-gold: #facc15;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--slate-950); 
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }

        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        .sidebar-item-active { 
            background-color: rgba(255, 255, 255, 0.05); 
            color: var(--kharon-gold); 
            border-left: 4px solid var(--kharon-gold); 
        }

        .command-card {
            background-color: var(--slate-900);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .command-card:hover {
            border-color: rgba(250, 204, 21, 0.3);
            transform: translateY(-2px);
            background-color: #161e2e;
        }

        .modal-bg { background-color: rgba(2, 6, 23, 0.98); backdrop-filter: blur(16px); }
        
        input, select, textarea { 
            outline: none; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 0.75rem; 
            padding: 1rem; 
            width: 100%; 
            background-color: var(--slate-800);
            color: white;
            font-size: 14px;
        }
        
        input:focus { border-color: var(--kharon-gold); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--slate-950); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .status-compliant { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-critical { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); animation: pulse-red 2s infinite; }
        .status-pending { background: rgba(250, 204, 21, 0.1); color: #facc15; border: 1px solid rgba(250, 204, 21, 0.2); }
        
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .capacity-bar { height: 6px; border-radius: 3px; background: #334155; overflow: hidden; }
        .capacity-fill { height: 100%; transition: width 1s ease-in-out; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: rgba(255,255,255,0.05);
            border-radius: 1rem;
            overflow: hidden;
        }
        .calendar-day { background: var(--slate-900); min-height: 120px; padding: 12px; transition: background 0.2s; }
        .calendar-header { background: rgba(255,255,255,0.02); text-align: center; padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; color: rgba(255,255,255,0.3); }
        .cal-event { font-size: 9px; padding: 4px 8px; border-radius: 6px; margin-top: 4px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; }
        
        .fatigue-high { color: #f87171; text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
    
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(250, 204, 21, 0.1);
            border-top-color: var(--kharon-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Variants */
        .toast-success { border-left: 4px solid #22c55e; }
        .toast-error { border-left: 4px solid #ef4444; }
        .toast-warning { border-left: 4px solid #f59e0b; }
        .toast-info { border-left: 4px solid #3b82f6; }

        /* Mobile Navigation */
        .mobile-menu-btn {
            display: none;
        }
        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(4px);
            z-index: 30;
        }
        @media (max-width: 1024px) {
            .mobile-menu-btn {
                display: flex;
            }
            #sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                width: 85%;
                max-width: 320px;
                transition: left 0.3s ease-out;
            }
            #sidebar.open {
                left: 0;
            }
            .mobile-overlay.active {
                display: block;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .empty-state i {
            opacity: 0.3;
            margin-bottom: 1rem;
        }

    </style>
</head>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 border border-white/10 text-white px-8 py-5 rounded-2xl shadow-2xl transition-all transform translate-y-20 opacity-0 z-[60] flex items-center gap-4">
        <i data-lucide="shield" class="w-4 h-4 text-yellow-400"></i>
        <span id="toast-text" class="font-bold text-sm uppercase tracking-widest font-black italic">Syncing Hub</span>

    <script>
        const state = {
            currentNav: 0,
            calendarView: 'Month',
            jobSearch: '',
            clientRegistry: {
                'Global Logistics': ['Server Room A', 'Control Room', 'Warehouse Alpha'],
                'Industrial A': ['Substation 4', 'Data Center B', 'Head Office'],
                'Medical Centre': ['Emergency Ward', 'ICU Ward'],
                'Retail Mall X': ['Level 1 Hub', 'Plant Room']
            },
            jobs: [
                { id: 'K-2402', client: 'Global Logistics', site: 'Control Room', type: 'SANS 10139 Service', status: 'Awaiting Sign-off', tech: 'Anthony', date: '2024-04-22', po: 'PO-102' },
                { id: 'K-2403', client: 'Industrial A', site: 'Data Center B', type: 'SANS 14520 Repair', status: 'Critical', tech: 'Lorenzo', date: '2024-04-22', po: 'PO-882' },
                { id: 'K-2401', client: 'Global Logistics', site: 'Server Room A', type: 'SANS 14520 Service', status: 'Compliant', tech: 'Anthony', date: '2023-11-10', po: 'PO-991' },
                { id: 'K-2404', client: 'Industrial A', site: 'Substation 4', type: 'SANS 10139 Install', status: 'Scheduled', tech: 'Unassigned', date: '2024-05-02', po: 'N/A' },
                { id: 'K-2405', client: 'Medical Centre', site: 'ICU Ward', type: 'SANS 10139 Fault', status: 'In Progress', tech: 'Zhora', date: '2024-04-22', po: 'PO-441' }
            ],
            techs: [
                { id: 'T1', name: 'Anthony', role: 'Senior Specialist', capacity: 85, status: 'On-Site', fatigue: 'Low', dutyHours: 6.2 },
                { id: 'T2', name: 'Lorenzo', role: 'Specialist', capacity: 40, status: 'Travel', fatigue: 'Moderate', dutyHours: 12.5 }, 
                { id: 'T3', name: 'Gert', role: 'Field Lead', capacity: 10, status: 'Office', fatigue: 'Low', dutyHours: 2.0 },
                { id: 'T4', name: 'Zhora', role: 'Trainee Assistant', capacity: 90, status: 'On-Site', fatigue: 'High', dutyHours: 9.1 }
            ],
            inventory: [
                { id: 'KH-INV-01', item: 'B7 Smoke Detectors', stock: 4, min: 10, wh: 2, van_a: 1, van_l: 1 },
                { id: 'KH-INV-02', item: '12V 7Ah Batteries', stock: 22, min: 15, wh: 18, van_a: 2, van_l: 2 },
                { id: 'KH-INV-03', item: 'FM200 Actuators', stock: 2, min: 3, wh: 2, van_a: 0, van_l: 0 }
            ],
            selectedJobAuditId: null,
            navItems: [
                { id: 0, title: 'Logistics Queue', icon: 'zap' },
                { id: 1, title: 'All Job Registry', icon: 'list-checks' },
                { id: 2, title: 'Operational Intake', icon: 'plus-circle' },
                { id: 3, title: 'Ops Calendar', icon: 'calendar' },
                { id: 4, title: 'Maintenance Cycles', icon: 'timer' },
                { id: 5, title: 'Personnel Monitor', icon: 'users' },
                { id: 6, title: 'Inventory Hub', icon: 'box' }
            ]
        };

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function setNav(index) {
            state.currentNav = index;
            state.selectedJobAuditId = null;
            render();
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }
        function openModal(h) { 
            document.getElementById('modal-content').innerHTML = h; 
            document.getElementById('modal-container').classList.remove('hidden'); 
            lucide.createIcons(); 
        }

        function render() {
            const navContainer = document.getElementById('nav-items');
            navContainer.innerHTML = state.navItems.map(item => `
                <button onclick="setNav(${item.id})" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.15em] transition-all ${state.currentNav === item.id ? 'sidebar-item-active shadow-lg' : 'text-white/30 hover:bg-white/5 hover:text-white/60'}">
                    <i data-lucide="${item.icon}" class="w-4 h-4"></i>
                    <span>${item.title}</span>
                </button>
            `).join('');

            const activeItem = state.navItems.find(i => i.id === state.currentNav);
            document.getElementById('current-page-crumb').innerText = activeItem.title;
            document.getElementById('portal-title').innerText = activeItem.title;

            const content = document.getElementById('content-area');
            if (state.selectedJobAuditId) content.innerHTML = renderJobAudit(state.selectedJobAuditId);
            else content.innerHTML = renderActiveModule();
            
            lucide.createIcons();
        }

        function renderActiveModule() {
            switch(state.currentNav) {
                case 0: return renderLogisticsQueue();
                case 1: return renderRegistry();
                case 2: return renderIntake();
                case 3: return renderCalendar();
                case 4: return renderCycles();
                case 5: return renderPersonnel();
                case 6: return renderInventory();
                default: return '';
            }
        }

        // --- 0. LOGISTICS QUEUE ---
        function renderLogisticsQueue() {
            const pending = state.jobs.filter(j => j.status === 'Awaiting Sign-off');
            return `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 animate-in">
                    <div class="lg:col-span-8 space-y-6">
                        <h3 class="text-xs font-black uppercase tracking-[0.3em] text-white/30 ml-2 italic">Regulatory Quality Gate</h3>
                        <div class="bg-green-500/5 border border-green-500/10 rounded-[2.5rem] p-10 min-h-[500px] flex flex-col gap-6">
                            ${pending.map(j => `
                                <div class="command-card p-8 border-l-4 border-l-yellow-400">
                                    <div class="flex justify-between items-start mb-6">
                                        <div><h4 class="text-2xl font-black uppercase italic">${j.site}</h4><p class="text-[10px] text-white/30 font-black mt-2">Specialist: ${j.tech} • SANS Field Data Ready</p></div>
                                        <button onclick="state.selectedJobAuditId='${j.id}';render();" class="px-4 py-1.5 rounded-full bg-yellow-400/10 text-yellow-400 text-[9px] font-black uppercase">Audit Evidence</button>
                                    </div>
                                    <div class="flex gap-4">
                                        <button onclick="openApprovalModal('${j.id}')" class="flex-1 py-4 bg-white text-slate-950 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Verify & Approve</button>
                                        <button class="px-8 py-4 border border-white/5 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white/30">Query Tech</button>
                                    </div>
                                </div>`).join('') || '<div class="m-auto opacity-10 text-center"><i data-lucide="shield-check" class="w-12 h-12 mx-auto mb-4"></i><p class="font-black uppercase text-[10px]">Queue Synchronized</p></div>'}
                        </div>
                    </div>
                    <div class="lg:col-span-4 space-y-6">
                         <h3 class="text-xs font-black uppercase tracking-[0.3em] text-white/30 ml-2 italic">Urgent P1 Deployment</h3>
                         ${state.jobs.filter(j=>j.status==='Critical').map(j=>`

        // --- SHARED: JOB AUDIT ---

        // --- MODAL: APPROVAL ---
        function openApprovalModal(id) {

        function approveJob(id) {
            const j = state.jobs.find(x => x.id === id);
            if(j) { j.status = 'Compliant'; showToast('Compliance Released'); closeModal(); render(); }
        }

        window.onload = render;
    
        
        // === DISPATCH PORTAL SPECIFIC FEATURES (See KHARON_PORTAL_CAPABILITY_ASSESSMENT.md for implementation) ===
        // TODO: Implement dispatch portal specific functionality
        
        // === ENHANCED FUNCTIONALITY ===
        
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Enhanced Toast with types
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            // Remove all variant classes
            toast.classList.remove('toast-success', 'toast-error', 'toast-warning', 'toast-info');
            toast.classList.add(`toast-${type}`);
            
            // Set icon based on type
            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            toastIcon.setAttribute('data-lucide', icons[type] || 'shield');
            lucide.createIcons();
            
            toastText.innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        
        // Loading State Management
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        }
        
        // Keyboard Navigation (ESC to close modals)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMobileMenu();
            }
        });
        
        // XSS Protection - Input Sanitization
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }
        
        // Currency Formatter
        function formatCurrency(amount, currency = 'ZAR') {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: currency
            }).format(amount);
        }
        
        // LocalStorage State Persistence
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(`kharon_${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('LocalStorage read error:', e);
                    return defaultValue;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(`kharon_${key}`, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.warn('LocalStorage write error:', e);
                    return false;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(`kharon_${key}`);
                } catch (e) {
                    console.warn('LocalStorage remove error:', e);
                }
            }
        };
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            hideLoading();
            lucide.createIcons();
            
            // Restore state from localStorage if available
            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
        });

    </script>
