<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kharon Client Portal - Facility Oversight</title>
    <script src="https://cdn.tailwindcss.com">
        
        // === CLIENT PORTAL SPECIFIC FEATURES (See KHARON_PORTAL_CAPABILITY_ASSESSMENT.md for implementation) ===
        // TODO: Implement client portal specific functionality
        
        // === ENHANCED FUNCTIONALITY ===
        
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Enhanced Toast with types
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            // Remove all variant classes
            toast.classList.remove('toast-success', 'toast-error', 'toast-warning', 'toast-info');
            toast.classList.add(`toast-${type}`);
            
            // Set icon based on type
            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            toastIcon.setAttribute('data-lucide', icons[type] || 'shield');
            lucide.createIcons();
            
            toastText.innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        
        // Loading State Management
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        }
        
        // Keyboard Navigation (ESC to close modals)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMobileMenu();
            }
        });
        
        // XSS Protection - Input Sanitization
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }
        
        // Currency Formatter
        function formatCurrency(amount, currency = 'ZAR') {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: currency
            }).format(amount);
        }
        
        // LocalStorage State Persistence
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(`kharon_${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('LocalStorage read error:', e);
                    return defaultValue;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(`kharon_${key}`, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.warn('LocalStorage write error:', e);
                    return false;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(`kharon_${key}`);
                } catch (e) {
                    console.warn('LocalStorage remove error:', e);
                }
            }
        };
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            hideLoading();
            lucide.createIcons();
            
            // Restore state from localStorage if available
            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
        });

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --kharon-gold: #facc15;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--slate-950); 
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }

        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        .sidebar-item-active { 
            background-color: rgba(255, 255, 255, 0.05); 
            color: var(--kharon-gold); 
            border-left: 4px solid var(--kharon-gold); 
        }

        .command-card {
            background-color: var(--slate-900);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .command-card:hover {
            border-color: rgba(250, 204, 21, 0.3);
            transform: translateY(-4px);
            background-color: #161e2e;
        }

        .modal-bg { background-color: rgba(2, 6, 23, 0.95); backdrop-filter: blur(12px); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--slate-950); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .status-compliant { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-critical { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        
        .guardian-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .parameter-mini {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--kharon-gold);
            background: rgba(250, 204, 21, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(250, 204, 21, 0.1);
            border-top-color: var(--kharon-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Variants */
        .toast-success { border-left: 4px solid #22c55e; }
        .toast-error { border-left: 4px solid #ef4444; }
        .toast-warning { border-left: 4px solid #f59e0b; }
        .toast-info { border-left: 4px solid #3b82f6; }

        /* Mobile Navigation */
        .mobile-menu-btn {
            display: none;
        }
        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(4px);
            z-index: 30;
        }
        @media (max-width: 1024px) {
            .mobile-menu-btn {
                display: flex;
            }
            #sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                width: 85%;
                max-width: 320px;
                transition: left 0.3s ease-out;
            }
            #sidebar.open {
                left: 0;
            }
            .mobile-overlay.active {
                display: block;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .empty-state i {
            opacity: 0.3;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="app" class="flex h-screen">
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay">
            <div class="text-center">
                <div class="spinner mb-4"></div>
                <p class="text-white/60 text-sm font-black uppercase tracking-widest">Initializing Kharon Portal</p>
            </div>
        </div>

        <!-- Mobile Overlay -->
        <div id="mobile-overlay" class="mobile-overlay" onclick="closeMobileMenu()" aria-hidden="true"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 bg-slate-900 border-r border-white/5 flex flex-col p-6 z-20 shadow-2xl overflow-y-auto" role="navigation" aria-label="Main navigation">
            <div class="flex items-center justify-between mb-10 pb-8 border-b border-white/5">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-yellow-400 rounded-2xl flex items-center justify-center text-slate-900 shadow-lg shadow-yellow-400/20" aria-hidden="true">

                </button>
            </div>

            <nav id="nav-items" class="flex-1 space-y-2 pr-2" role="menubar" aria-label="Portal sections">
                <button onclick="setNav(0)" id="nav-0" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.15em] sidebar-item-active transition-all" role="menuitem" aria-label="View portfolio pulse dashboard">
                    <i data-lucide="activity" class="w-4 h-4" aria-hidden="true"></i>
                    <span>Portfolio Pulse</span>
                </button>
                <button onclick="setNav(1)" id="nav-1" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.15em] text-white/30 hover:bg-white/5 transition-all" role="menuitem" aria-label="View site inventory">
                    <i data-lucide="layout-grid" class="w-4 h-4" aria-hidden="true"></i>
                    <span>Site Inventory</span>
                </button>
                <button onclick="setNav(2)" id="nav-2" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.15em] text-white/30 hover:bg-white/5 transition-all" role="menuitem" aria-label="Access regulatory vault">
                    <i data-lucide="lock" class="w-4 h-4" aria-hidden="true"></i>
                    <span>Regulatory Vault</span>
                </button>
                <button onclick="setNav(3)" id="nav-3" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.15em] text-white/30 hover:bg-white/5 transition-all" role="menuitem" aria-label="Log new incident">
                    <i data-lucide="plus-circle" class="w-4 h-4" aria-hidden="true"></i>
                    <span>Log Incident</span>
                </button>
            </nav>

            <div class="pt-6 border-t border-white/5 space-y-4">
                <div class="flex items-center justify-between text-[10px] font-black uppercase text-white/20">
                    <span>Insurance Readiness</span>
                    <span class="text-green-500">OPTIMAL</span>
                </div>
                <div class="h-1 bg-slate-800 rounded-full overflow-hidden" role="progressbar" aria-valuenow="94" aria-valuemin="0" aria-valuemax="100" aria-label="Insurance readiness progress">
                    <div class="h-full bg-green-500 w-[94%]"></div>
                </div>
                <button onclick="window.location.reload()" class="w-full py-4 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest text-white/40 hover:bg-red-500/10 hover:text-red-400 transition-all border border-white/5" aria-label="Disconnect from portal">Disconnect</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-slate-950 relative">
            <header class="sticky top-0 z-10 bg-slate-950/90 backdrop-blur-xl px-10 py-8 border-b border-white/5 flex justify-between items-center">
                <div>
                    <div class="text-[10px] text-white/20 uppercase tracking-[0.3em] font-black mb-1 flex items-center gap-2">
                        <span>External Access</span> <i data-lucide="chevron-right" class="w-3 h-3"></i> <span id="current-page-crumb">Overview</span>
                    </div>
                    <h2 id="portal-title" class="text-3xl font-black text-white tracking-tighter italic uppercase leading-none">Security Portfolio</h2>
                </div>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p class="text-xs font-black text-white leading-none mb-1 font-bold">Global Logistics Ltd</p>
                        <p id="user-role-label" class="text-[10px] text-white/30 font-bold uppercase tracking-widest">Facility Operations</p>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-slate-900 flex items-center justify-center font-black text-yellow-400 border border-white/10 shadow-inner">GL</div>
                </div>
            </header>

            <div id="content-area" class="p-10 animate-in"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center hidden p-6">
        <div class="modal-bg absolute inset-0" onclick="closeModal()"></div>
        <div class="bg-slate-900 border border-white/10 rounded-[2.5rem] w-full max-w-3xl p-12 relative shadow-2xl animate-in overflow-y-auto max-h-[90vh]" id="modal-content"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 border border-white/10 text-white px-8 py-5 rounded-2xl shadow-2xl transition-all transform translate-y-20 opacity-0 z-[60] flex items-center gap-4">
        <i data-lucide="shield" class="w-4 h-4 text-yellow-400"></i>
        <span id="toast-text" class="font-bold text-sm uppercase tracking-widest font-black italic">Success</span>
    </div>

    <script>
        const state = {
            currentNav: 0,
            selectedSiteId: null,
            sites: [
                { 
                    id: 'S-01', 
                    name: 'Main Server Room', 
                    type: 'SANS 14520 Gas Suppression', 
                    lastService: '2023-11-10', 
                    nextService: 'May 2024',
                    batteryAge: '5 Months', 
                    health: '98.4%', 
                    pressure: '42.5 Bar',
                    voltage: '27.4 VDC',
                    lead: 'Anthony',
                    status: 'Compliant',
                    cert: 'CER-14520-8821'
                },
                { 
                    id: 'S-02', 
                    name: 'Control Room A', 
                    type: 'SANS 10139 Fire Detection', 
                    lastService: '2024-04-22', 
                    nextService: 'Oct 2024',
                    batteryAge: '25 Months (Service Due)', 
                    health: '82.0%', 
                    pressure: 'N/A',
                    voltage: '24.1 VDC (Low)',
                    lead: 'Lorenzo',
                    status: 'Remedial Required',
                    cert: 'Pending'
                },
                { 
                    id: 'S-03', 
                    name: 'Distribution Hub', 
                    type: 'SANS 14520 Gas Suppression', 
                    lastService: '2023-08-15', 
                    nextService: 'Aug 2024',
                    batteryAge: '8 Months', 
                    health: '100%', 
                    pressure: '41.8 Bar',
                    voltage: '27.6 VDC',
                    lead: 'Anthony',
                    status: 'Compliant',
                    cert: 'CER-14520-7710'
                }
            ],
            quotes: [
                { id: 'KH-Q-1022', site: 'Control Room A', desc: 'SANS 10139 Battery Refresh Cycle', val: 'R1,850.00' }
            ]
        };

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function setNav(index) {
            state.currentNav = index;
            state.selectedSiteId = null;
            render();
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }
        
        function openSiteDetail(id) {
            state.selectedSiteId = id;
            render();
        }

        function render() {
            const crumbs = ['Overview', 'Inventory', 'Vault', 'Support'];
            document.getElementById('current-page-crumb').innerText = state.selectedSiteId ? "Site Detail" : crumbs[state.currentNav];
            
            [0,1,2,3].forEach(i => {
                const btn = document.getElementById(`nav-${i}`);
                if (btn) {
                    if (i === state.currentNav) {
                        btn.classList.add('sidebar-item-active', 'shadow-lg');
                        btn.classList.remove('text-white/30');
                    } else {
                        btn.classList.remove('sidebar-item-active', 'shadow-lg');
                        btn.classList.add('text-white/30');
                    }
                }
            });

            const content = document.getElementById('content-area');
            if (state.selectedSiteId) {
                content.innerHTML = renderSiteDetail(state.selectedSiteId);
            } else {
                content.innerHTML = renderModule(state.currentNav);
            }
            lucide.createIcons();
        }

        function renderModule(index) {
            switch(index) {
                case 0: return renderOverview();
                case 1: return renderInventory();
                case 2: return renderVault();
                case 3: return renderSupport();
                default: return '';
            }
        }

        // --- MODULE: OVERVIEW ---
        function renderOverview() {
            return `
                <div class="space-y-10 animate-in">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${renderSummaryStat('Insurance Readiness', '94%', 'shield-check', 'text-green-500')}
                        ${renderSummaryStat('Sites Guarded', state.sites.length, 'map-pin', 'text-blue-400')}
                        ${renderSummaryStat('Action Items', state.quotes.length, 'alert-circle', 'text-yellow-400')}
                    </div>

                    <div class="bg-blue-600/5 border border-blue-600/20 p-10 rounded-[2.5rem] flex items-center justify-between gap-8 relative overflow-hidden">
                        <div class="flex items-center gap-8 relative z-10">
                            <div class="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center text-blue-400"><i data-lucide="info" class="w-8 h-8"></i></div>
                            <div>
                                <h4 class="text-2xl font-black uppercase italic tracking-tighter leading-tight">Regulatory Forewarning</h4>
                                <p class="text-sm text-white/40 max-w-md mt-2 font-medium">Site <span class="text-white/80">Control Room A</span> requires a SANS 10139 battery refresh to maintain CoC validity. Pricing has been generated in the quote hub.</p>
                            </div>
                        </div>
                        <button onclick="setNav(1)" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl hover:scale-105 transition-all relative z-10">Review Remedials</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div onclick="setNav(1)" class="command-card p-12 cursor-pointer group">
                            <p class="text-[10px] font-black uppercase text-white/20 tracking-[0.4em] mb-12">Registry Command</p>
                            <h3 class="text-4xl font-black italic uppercase tracking-tighter group-hover:text-yellow-400 transition-colors leading-none">Facility Inventory</h3>
                            <p class="text-sm text-white/30 mt-6 font-medium italic">Monitor real-time technical parameters and standby power health.</p>
                        </div>
                        <div onclick="setNav(2)" class="command-card p-12 cursor-pointer group">
                            <p class="text-[10px] font-black uppercase text-white/20 tracking-[0.4em] mb-12">Compliance Repository</p>
                            <h3 class="text-4xl font-black italic uppercase tracking-tighter group-hover:text-green-500 transition-colors leading-none">Regulatory Vault</h3>
                            <p class="text-sm text-white/30 mt-6 font-medium italic">On-demand access to Folder 14 Certificates of Compliance.</p>
                        </div>
                    </div>
                </div>`;
        }

        // --- MODULE: INVENTORY (TILES) ---
        function renderInventory() {
            return `
                <div class="space-y-10 animate-in">
                    <h3 class="text-4xl font-black italic uppercase tracking-tighter">Facility Asset Ledger</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${state.sites.map(site => `
                            <div onclick="openSiteDetail('${site.id}')" class="command-card p-10 flex flex-col group cursor-pointer relative overflow-hidden">

        }

        // --- SITE DETAIL (DEEP DIVE) ---
        function renderSiteDetail(id) {
            const site = state.sites.find(s => s.id === id);
            const siteQuote = state.quotes.find(q => q.site === site.name);

            return `
                <div class="space-y-10 animate-in pb-12">
                    <button onclick="setNav(1)" class="flex items-center gap-2 text-[10px] font-black uppercase text-white/40 hover:text-white transition-colors">

                    <div class="bg-slate-900 border-l-8 border-yellow-400 p-12 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 p-12 opacity-[0.03]"><i data-lucide="shield-check" class="w-48 h-48"></i></div>
                        <div class="relative z-10">
                            <p class="text-[11px] font-black uppercase tracking-[0.4em] text-yellow-400 mb-6 italic">Facility Intelligence Profile</p>

                            <div class="grid grid-cols-2 md:grid-cols-4 gap-8 mt-12 pt-12 border-t border-white/5">

                                <div class="space-y-1"><p class="text-[9px] font-black text-white/20 uppercase tracking-widest">SANS Status</p><p class="font-bold text-lg text-green-500 uppercase">${site.status}</p></div>
                                <div class="space-y-1"><p class="text-[9px] font-black text-white/20 uppercase tracking-widest">Power Stability</p><p class="font-bold text-lg text-white/80">${site.voltage}</p></div>
                                <div class="space-y-1"><p class="text-[9px] font-black text-white/20 uppercase tracking-widest">Last Polled Integrity</p><p class="font-bold text-lg text-white/80">${site.health}</p></div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <!-- PROVENANCE -->
                        <div class="space-y-6">
                            <h4 class="text-xs font-black uppercase tracking-widest text-white/30 ml-2">Compliance Provenance (Folder 14)</h4>
                            <div class="space-y-4">
                                ${[
                                    { label: 'Certificate of Compliance', icon: 'file-lock', ref: site.cert, val: 'SANS Registered' },
                                    { label: 'Technical Service Report', icon: 'clipboard-check', ref: 'SR-' + id, val: 'Clause 15 Verified' },
                                    { label: 'Site Attendance Jobcard', icon: 'pen-tool', ref: 'JC-' + id, val: site.lastService }
                                ].map(doc => `
                                    <div onclick="showToast('Authenticating Provenance...')" class="command-card p-8 flex justify-between items-center group cursor-pointer hover:bg-slate-800 transition-all">
                                        <div class="flex items-center gap-8">
                                            <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-white/20 group-hover:text-yellow-400 transition-all"><i data-lucide="${doc.icon}"></i></div>
                                            <div>
                                                <p class="font-bold text-sm text-white/80 uppercase tracking-tight">${doc.label}</p>
                                                <div class="flex gap-4 mt-2">
                                                    <span class="parameter-mini">${doc.val}</span>
                                                    <span class="text-[9px] text-white/20 uppercase font-black">Ref: ${doc.ref}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <i data-lucide="download" class="w-6 h-6 text-white/10 group-hover:text-white transition-colors"></i>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- REMEDIALS -->
                        <div class="space-y-6">
                            <h4 class="text-xs font-black uppercase tracking-widest text-white/30 ml-2">Remedial Integrity Actions</h4>
                            ${siteQuote ? `
                                <div class="bg-yellow-400/5 border border-yellow-400/20 p-10 rounded-[2.5rem] space-y-8">
                                    <div class="flex justify-between items-start">
                                        <div><h4 class="text-2xl font-black uppercase text-yellow-400 italic">Maintenance Proposal</h4><p class="text-xs text-white/40 mt-2 font-medium">Authorized remedial action required for SANS certification.</p></div>
                                        <i data-lucide="alert-octagon" class="text-yellow-400 animate-pulse"></i>
                                    </div>
                                    <div class="bg-slate-950 p-8 rounded-3xl border border-white/5">
                                        <div class="flex justify-between items-baseline mb-2">
                                            <span class="text-sm font-bold text-white/80">${siteQuote.desc}</span>
                                            <span class="text-2xl font-black text-white italic">${siteQuote.val}</span>
                                        </div>
                                        <p class="text-[9px] font-black text-white/20 uppercase tracking-widest">Framework: SANS 10139 Section 15.2</p>
                                    </div>
                                    <button onclick="showToast('Engagement Approved. Tech dispatched.')" class="w-full py-6 bg-yellow-400 text-slate-950 rounded-2xl font-black uppercase text-[12px] tracking-[0.2em] shadow-2xl hover:scale-105 active:scale-95 transition-all">Authorize Remedial Works</button>
                                </div>
                            ` : `
                                <div class="command-card p-24 flex flex-col items-center justify-center text-center opacity-30">
                                    <i data-lucide="shield-check" class="w-12 h-12 mb-6"></i>
                                    <p class="text-[11px] font-black uppercase tracking-widest leading-relaxed italic">Site is currently fully compliant.<br>No remedial actions pending.</p>
                                </div>
                            `}
                        </div>
                    </div>
                </div>`;
        }

        // --- MODULE: VAULT ---
        function renderVault() {
            return `
                <div class="space-y-10 animate-in">
                    <h3 class="text-4xl font-black italic uppercase tracking-tighter">Regulatory Vault (Folder 14)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${state.sites.filter(s => s.cert !== 'Pending').map(site => `
                            <div class="command-card p-10 flex items-center justify-between border-l-4 border-l-green-500 group cursor-pointer hover:bg-slate-900/50 transition-all">
                                <div class="flex items-center gap-10">
                                    <div class="p-6 bg-green-500/10 rounded-3xl text-green-500 group-hover:bg-green-500/20 transition-all"><i data-lucide="file-check" class="w-10 h-10"></i></div>
                                    <div><h4 class="font-black text-2xl uppercase italic tracking-tighter text-white/90 leading-none">${site.name}</h4><p class="text-[10px] text-white/30 uppercase font-black mt-3 tracking-widest">SANS Certified • ${site.lastService}</p></div>
                                </div>
                                <i data-lucide="download" class="w-8 h-8 text-white/5 group-hover:text-white transition-all"></i>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        // --- MODULE: SUPPORT ---
        function renderSupport() {
            return `
                <div class="max-w-3xl mx-auto space-y-10 animate-in">
                    <div class="text-center space-y-4">
                        <h3 class="text-6xl font-black italic tracking-tighter uppercase italic leading-none">Operational Support</h3>
                        <p class="text-white/20 text-[10px] font-black uppercase tracking-[1em] ml-4">Direct Command Link</p>
                    </div>
                    <form onsubmit="event.preventDefault(); showToast('Support Request Dispatched'); setNav(0);" class="command-card p-12 space-y-10 shadow-2xl">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-white/30 tracking-widest ml-1">Affected site</label>
                            <select class="h-20 font-black text-2xl uppercase italic bg-slate-950 px-8 rounded-3xl w-full border border-white/5 outline-none focus:border-yellow-400 transition-colors">
                                ${state.sites.map(s => `<option>${s.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-white/30 tracking-widest ml-1">Engagement Urgency</label>
                            <div class="grid grid-cols-3 gap-4">
                                <div class="p-5 bg-slate-950 border border-white/10 rounded-2xl text-center text-[10px] font-black uppercase tracking-widest hover:bg-slate-800 cursor-pointer transition-all">P3 Routine</div>
                                <div class="p-5 bg-yellow-400/5 border border-yellow-400/20 rounded-2xl text-center text-[10px] font-black uppercase tracking-widest text-yellow-400 hover:bg-yellow-400/10 cursor-pointer transition-all">P2 Technical</div>
                                <div class="p-5 bg-red-500/5 border border-red-500/20 rounded-2xl text-center text-[10px] font-black uppercase tracking-widest text-red-500 hover:bg-red-500/10 cursor-pointer transition-all">P1 Critical</div>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-white/30 tracking-widest ml-1">Issue provenance</label>
                            <textarea rows="5" class="p-8 bg-slate-950/50 rounded-3xl w-full border border-white/5 outline-none focus:border-yellow-400 transition-colors" placeholder="Detail any system alerts, fault codes, or maintenance requirements..."></textarea>
                        </div>
                        <button type="submit" class="w-full py-8 bg-yellow-400 text-slate-950 rounded-[2.5rem] font-black uppercase text-[14px] tracking-[0.4em] shadow-2xl active:scale-95 transition-all">Dispatch Support Ticket</button>
                    </form>
                </div>`;
        }

        // --- UTILS ---
        function renderSummaryStat(label, val, icon, color) {
            return `
                <div class="command-card p-10 flex flex-col justify-between group relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 p-8 opacity-[0.03] group-hover:opacity-[0.08] transition-opacity"><i data-lucide="${icon}" class="w-24 h-24"></i></div>
                    <div class="flex justify-between items-start mb-12 text-[11px] font-black uppercase text-white/30 tracking-[0.3em] relative z-10"><span>${label}</span><i data-lucide="${icon}" class="w-5 h-5 ${color}"></i></div>
                    <p class="text-5xl font-black tracking-tighter text-white group-hover:scale-105 transition-all italic relative z-10">${val}</p>
                </div>`;
        }

        window.onload = render;
    
        
        // === CLIENT PORTAL SPECIFIC FEATURES (See KHARON_PORTAL_CAPABILITY_ASSESSMENT.md for implementation) ===
        // TODO: Implement client portal specific functionality
        
        // === ENHANCED FUNCTIONALITY ===
        
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Enhanced Toast with types
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            // Remove all variant classes
            toast.classList.remove('toast-success', 'toast-error', 'toast-warning', 'toast-info');
            toast.classList.add(`toast-${type}`);
            
            // Set icon based on type
            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            toastIcon.setAttribute('data-lucide', icons[type] || 'shield');
            lucide.createIcons();
            
            toastText.innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        
        // Loading State Management
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        }
        
        // Keyboard Navigation (ESC to close modals)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMobileMenu();
            }
        });
        
        // XSS Protection - Input Sanitization
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }
        
        // Currency Formatter
        function formatCurrency(amount, currency = 'ZAR') {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: currency
            }).format(amount);
        }
        
        // LocalStorage State Persistence
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(`kharon_${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('LocalStorage read error:', e);
                    return defaultValue;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(`kharon_${key}`, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.warn('LocalStorage write error:', e);
                    return false;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(`kharon_${key}`);
                } catch (e) {
                    console.warn('LocalStorage remove error:', e);
                }
            }
        };
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            hideLoading();
            lucide.createIcons();
            
            // Restore state from localStorage if available
            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
        });

    </script>
</body>
