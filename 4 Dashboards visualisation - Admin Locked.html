    <title>Kharon Command - Business Oversight</title>
    <script src="https://cdn.tailwindcss.com">
        
        // === ADMIN PORTAL SPECIFIC FEATURES (See KHARON_PORTAL_CAPABILITY_ASSESSMENT.md for implementation) ===
        // TODO: Implement admin portal specific functionality
        
        // === ENHANCED FUNCTIONALITY ===
        
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Enhanced Toast with types
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            // Remove all variant classes
            toast.classList.remove('toast-success', 'toast-error', 'toast-warning', 'toast-info');
            toast.classList.add(`toast-${type}`);
            
            // Set icon based on type
            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            toastIcon.setAttribute('data-lucide', icons[type] || 'shield');
            lucide.createIcons();
            
            toastText.innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        
        // Loading State Management
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        }
        
        // Keyboard Navigation (ESC to close modals)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMobileMenu();
            }
        });
        
        // XSS Protection - Input Sanitization
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }
        
        // Currency Formatter
        function formatCurrency(amount, currency = 'ZAR') {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: currency
            }).format(amount);
        }
        
        // LocalStorage State Persistence
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(`kharon_${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('LocalStorage read error:', e);
                    return defaultValue;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(`kharon_${key}`, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.warn('LocalStorage write error:', e);
                    return false;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(`kharon_${key}`);
                } catch (e) {
                    console.warn('LocalStorage remove error:', e);
                }
            }
        };
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            hideLoading();
            lucide.createIcons();
            
            // Restore state from localStorage if available
            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
        });

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --kharon-gold: #facc15;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--slate-950); 
            color: #f1f5f9;
        }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        .sidebar-item-active { 
            background-color: rgba(255, 255, 255, 0.05); 
            color: var(--kharon-gold); 
            border-left: 4px solid var(--kharon-gold); 
        }

        .command-card {
            background-color: var(--slate-900);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .command-card:hover {
            border-color: rgba(250, 204, 21, 0.3);
            transform: translateY(-2px);
            background-color: #161e2e;
        }

        .modal-bg { background-color: rgba(2, 6, 23, 0.95); backdrop-filter: blur(12px); }
        
        input, select, textarea { 
            outline: none; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 0.75rem; 
            padding: 1rem; 
            width: 100%; 
            background-color: var(--slate-800);
            color: white;
            font-size: 14px;
        }
        
        input:focus { border-color: var(--kharon-gold); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--slate-950); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .status-compliant { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-critical { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); animation: pulse-red 2s infinite; }
        .status-pending { background: rgba(250, 204, 21, 0.1); color: #facc15; border: 1px solid rgba(250, 204, 21, 0.2); }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(250, 204, 21, 0.1);
            border-top-color: var(--kharon-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Variants */
        .toast-success { border-left: 4px solid #22c55e; }
        .toast-error { border-left: 4px solid #ef4444; }
        .toast-warning { border-left: 4px solid #f59e0b; }
        .toast-info { border-left: 4px solid #3b82f6; }

        /* Mobile Navigation */
        .mobile-menu-btn {
            display: none;
        }
        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(4px);
            z-index: 30;
        }
        @media (max-width: 1024px) {
            .mobile-menu-btn {
                display: flex;
            }
            #sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                width: 85%;
                max-width: 320px;
                transition: left 0.3s ease-out;
            }
            #sidebar.open {
                left: 0;
            }
            .mobile-overlay.active {
                display: block;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .empty-state i {
            opacity: 0.3;
            margin-bottom: 1rem;
        }

    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="app" class="flex h-screen">

    <script>
        const state = {
            clientRegistry: {
                'Global Logistics': ['Server Room A', 'Control Room', 'Warehouse Alpha'],
                'Industrial A': ['Substation 4', 'Data Center B', 'Head Office'],
                'Medical Centre': ['Emergency Ward', 'ICU Ward', 'Data Suite'],
                'Tech Park B': ['Archives', 'Loading Dock']
            },
            jobs: [
                { id: 'K-2401', client: 'Global Logistics', site: 'Server Room A', type: 'SANS 14520 Gas', status: 'Compliant', tech: 'Anthony', val: 4200, date: '2023-11-10', invoiced: true, po: 'PO-991' },
                { id: 'K-2402', client: 'Global Logistics', site: 'Control Room', type: 'SANS 10139 Detect', status: 'Awaiting Sign-off', tech: 'Anthony', val: 1850, date: '2024-04-22', invoiced: false, po: 'PO-102' },
                { id: 'K-2403', client: 'Industrial A', site: 'Data Center B', type: 'SANS 14520 Gas', status: 'Critical', tech: 'Lorenzo', val: 12500, date: '2022-10-15', invoiced: true, po: 'PO-882' },
                { id: 'K-2404', client: 'Industrial A', site: 'Substation 4', type: 'SANS 10139 Detect', status: 'Scheduled', tech: 'Unassigned', val: 3300, date: '2023-08-05', invoiced: false, po: 'N/A' },
                { id: 'K-2405', client: 'Tech Park B', site: 'Archives', type: 'SANS 14520 Gas', status: 'Scheduled', tech: 'Lorenzo', val: 2100, date: '2023-09-12', invoiced: false, po: 'PO-441' }
            ],
            staff: [
                { name: 'Anthony', role: 'Senior Specialist', sans10139: 'Active', sans14520: 'Active', medical: '2024-12-15', wellness: 'Stable', incidents: 0 },
                { name: 'Lorenzo', role: 'Technician', sans10139: 'Active', sans14520: 'Expiring', medical: '2024-06-10', wellness: 'Fatigued', incidents: 2 },
                { name: 'Gert', role: 'Field Lead', sans10139: 'Active', sans14520: 'Active', medical: '2025-01-20', wellness: 'Stable', incidents: 0 },
                { name: 'Zhora', role: 'Assistant / Trainee', sans10139: 'Training', sans14520: 'N/A', medical: '2025-03-12', wellness: 'Excellent', incidents: 0 }
            ],
            inventory: [
                { item: 'B7 Smoke Detectors', stock: 4, min: 10, warehouse: 2, van_anthony: 1, van_lorenzo: 1 },
                { item: '12V 7Ah Batteries', stock: 22, min: 15, warehouse: 18, van_anthony: 2, van_lorenzo: 2 },
                { item: 'FM200 Discharge Nozzles', stock: 2, min: 5, warehouse: 2, van_anthony: 0, van_lorenzo: 0 }
            ],
            currentNav: 0,
            selectedJobId: null,
            jobSearch: '',
            calendarView: 'Week'
        };

        const navItems = [
            { title: 'Business Pulse', icon: 'activity', group: 'Oversight' },
            { title: 'Personnel Integrity', icon: 'users', group: 'Oversight' },
            { title: 'Corporate Registry', icon: 'clipboard-list', group: 'Oversight' },
            { title: 'Regulatory Vault', icon: 'file-lock', group: 'Oversight' },
            { title: 'HSE Audit Hub', icon: 'shield-alert', group: 'Oversight' },
            { title: 'Logistics Queue', icon: 'zap', group: 'Operations' },
            { title: 'Job Dispatcher', icon: 'plus-circle', group: 'Operations' },
            { title: 'Unified Calendar', icon: 'calendar', group: 'Operations' },
            { title: 'Inventory Command', icon: 'box', group: 'Operations' }
        ];

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function setNav(index) {
            state.currentNav = index;
            state.selectedJobId = null;
            render();
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }

        function openJobDetail(id) { state.selectedJobId = id; render(); }

        function render() {
            const currentItem = navItems[state.currentNav];
            document.getElementById('portal-title').innerText = state.selectedJobId ? "Technical Audit" : currentItem.title;
            document.getElementById('current-page-crumb').innerText = state.selectedJobId ? "Deep Audit" : currentItem.title;

            // Nav Menu with Groups
            document.getElementById('nav-items').innerHTML = navItems.map((item, i) => `
                ${(i === 0 || navItems[i-1].group !== item.group) ? `<p class="text-[9px] font-black uppercase text-white/20 mt-6 mb-2 px-5 tracking-widest">${item.group}</p>` : ''}
                <button onclick="setNav(${i})" class="w-full flex items-center justify-between px-5 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-[0.15em] transition-all ${state.currentNav === i ? 'sidebar-item-active shadow-lg' : 'text-white/30 hover:bg-white/5 hover:text-white/60'}">
                    <div class="flex items-center gap-4"><i data-lucide="${item.icon}" class="w-4 h-4"></i><span>${item.title}</span></div>
                </button>
            `).join('');

            // Compliance Pulse
            const compliant = state.jobs.filter(j => j.status === 'Compliant').length;
            const pct = Math.round((compliant / state.jobs.length) * 100);
            document.getElementById('compliance-pct').innerText = pct + '%';
            document.getElementById('compliance-bar').style.width = pct + '%';

            const content = document.getElementById('content-area');
            if (state.selectedJobId) content.innerHTML = renderJobAudit(state.selectedJobId);
            else content.innerHTML = renderModule(state.currentNav);
            
            lucide.createIcons();
        }

        function renderModule(navIndex) {
            switch(navIndex) {
                case 0: return renderBusinessPulse();
                case 1: return renderStaffRegistry();
                case 2: return renderOperationsRail();
                case 3: return renderVault();
                case 4: return renderHSEHub();
                case 5: return renderLogisticsQueue();
                case 6: return renderNewJobLoader();
                case 7: return renderCalendar();
                case 8: return renderInventory();
                default: return '';
            }
        }

        // --- OVERVIEW: BUSINESS PULSE ---
        function renderBusinessPulse() {
            const totalRevenue = state.jobs.reduce((acc, curr) => acc + curr.val, 0);
            const billedRevenue = state.jobs.filter(j => j.invoiced).reduce((acc, curr) => acc + curr.val, 0);
            return `
                <div class="space-y-10 animate-in">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        ${renderStat('Workbook Valuation', 'R' + totalRevenue.toLocaleString(), 'banknote', 'text-yellow-400')}
                        ${renderStat('Invoiced (Booked)', 'R' + billedRevenue.toLocaleString(), 'check-circle', 'text-green-500')}
                        ${renderStat('WIP Revenue Gap', 'R' + (totalRevenue - billedRevenue).toLocaleString(), 'trending-down', 'text-red-400')}
                        ${renderStat('Field Sentiment', 'Concern', 'heart', 'text-blue-400')}
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div class="command-card p-10">
                            <h3 class="text-xs font-black uppercase tracking-widest text-white/30 mb-8 italic">Managerial Alerts</h3>
                            <div class="space-y-4">
                                <div class="p-6 bg-red-500/5 border border-red-500/10 rounded-2xl flex items-center justify-between">
                                    <div><p class="font-bold text-red-400">Critical: SANS 14520 Breach</p><p class="text-[10px] text-white/20 uppercase mt-1">Data Center B • 18 Months since last service</p></div>
                                    <button onclick="setNav(5)" class="px-6 py-2 bg-red-500 text-white rounded-xl text-[9px] font-black uppercase">Dispatch</button>
                                </div>
                                <div class="p-6 bg-blue-500/5 border border-blue-500/10 rounded-2xl flex items-center justify-between">
                                    <div><p class="font-bold text-blue-400">Personnel: Fatigue Indicator</p><p class="text-[10px] text-white/20 uppercase mt-1">Lorenzo • 2 Near-Miss incidents reported</p></div>
                                    <button onclick="setNav(1)" class="px-6 py-2 bg-blue-500 text-white rounded-xl text-[9px] font-black uppercase">Wellness</button>
                                </div>
                            </div>
                        </div>

        // --- SHARED: JOB AUDIT VIEW ---
        function renderJobAudit(id) {

        function renderOperationsRail() { return `<div class="command-card p-10"><h3 class="text-xl font-black italic uppercase mb-10">Master operationalRegistry</h3><table class="w-full text-left text-xs"><thead class="text-white/20 border-b border-white/5"><tr class="uppercase font-black tracking-widest"><th class="pb-6 px-4">ID</th><th class="pb-6">Client / Site</th><th class="pb-6">Value</th><th class="pb-6">Outcome</th></tr></thead><tbody class="divide-y divide-white/5">${state.jobs.map(j => `<tr onclick="openJobDetail('${j.id}')" class="hover:bg-white/5 cursor-pointer"><td>${j.id}</td><td class="py-6 font-bold text-white/80">${j.site}</td><td>R${j.val.toLocaleString()}</td><td><span class="px-3 py-1 rounded-full ${j.status === 'Compliant' ? 'status-compliant' : 'status-pending'}">${j.status}</span></td></tr>`).join('')}</tbody></table></div>`; }

        function approveJob(id) { const j = state.jobs.find(x=>x.id===id); if(j){ j.status = 'Compliant'; j.cert = 'CER-AUTO-' + Math.floor(Math.random()*999); showToast('Job Authorized. SANS Certificate Issued.'); render(); } }

        window.onload = render;
    
        
        // === ADMIN PORTAL SPECIFIC FEATURES (See KHARON_PORTAL_CAPABILITY_ASSESSMENT.md for implementation) ===
        // TODO: Implement admin portal specific functionality
        
        // === ENHANCED FUNCTIONALITY ===
        
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Enhanced Toast with types
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            // Remove all variant classes
            toast.classList.remove('toast-success', 'toast-error', 'toast-warning', 'toast-info');
            toast.classList.add(`toast-${type}`);
            
            // Set icon based on type
            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            toastIcon.setAttribute('data-lucide', icons[type] || 'shield');
            lucide.createIcons();
            
            toastText.innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        
        // Loading State Management
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        }
        
        // Keyboard Navigation (ESC to close modals)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMobileMenu();
            }
        });
        
        // XSS Protection - Input Sanitization
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }
        
        // Currency Formatter
        function formatCurrency(amount, currency = 'ZAR') {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: currency
            }).format(amount);
        }
        
        // LocalStorage State Persistence
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(`kharon_${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('LocalStorage read error:', e);
                    return defaultValue;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(`kharon_${key}`, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.warn('LocalStorage write error:', e);
                    return false;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(`kharon_${key}`);
                } catch (e) {
                    console.warn('LocalStorage remove error:', e);
                }
            }
        };
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            hideLoading();
            lucide.createIcons();
            
            // Restore state from localStorage if available
            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
        });

    </script>
