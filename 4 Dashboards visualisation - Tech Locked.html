    <script src="https://cdn.tailwindcss.com">
        
        // === TECH PORTAL SPECIFIC FEATURES (See KHARON_PORTAL_CAPABILITY_ASSESSMENT.md for implementation) ===
        // TODO: Implement tech portal specific functionality
        
        // === ENHANCED FUNCTIONALITY ===
        
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Enhanced Toast with types
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            // Remove all variant classes
            toast.classList.remove('toast-success', 'toast-error', 'toast-warning', 'toast-info');
            toast.classList.add(`toast-${type}`);
            
            // Set icon based on type
            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            toastIcon.setAttribute('data-lucide', icons[type] || 'shield');
            lucide.createIcons();
            
            toastText.innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        
        // Loading State Management
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        }
        
        // Keyboard Navigation (ESC to close modals)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMobileMenu();
            }
        });
        
        // XSS Protection - Input Sanitization
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }
        
        // Currency Formatter
        function formatCurrency(amount, currency = 'ZAR') {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: currency
            }).format(amount);
        }
        
        // LocalStorage State Persistence
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(`kharon_${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('LocalStorage read error:', e);
                    return defaultValue;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(`kharon_${key}`, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.warn('LocalStorage write error:', e);
                    return false;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(`kharon_${key}`);
                } catch (e) {
                    console.warn('LocalStorage remove error:', e);
                }
            }
        };
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            hideLoading();
            lucide.createIcons();
            
            // Restore state from localStorage if available
            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
        });

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;

            --kharon-gold: #facc15;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--slate-950); 
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

            background-color: rgba(255, 255, 255, 0.05);

        .modal-bg { background-color: rgba(2, 6, 23, 0.98); backdrop-filter: blur(16px); }
        
        input, select, textarea { 
            outline: none; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 0.75rem; 
            padding: 1rem; 
            width: 100%; 
            background-color: var(--slate-800);
            color: white;
            font-size: 16px;
        }
        
        input:focus { border-color: var(--kharon-gold); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--slate-950); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .btn-primary {
            background-color: var(--kharon-gold);
            color: var(--slate-950);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 1rem;
            transition: all 0.2s;
        }
        
        .btn-primary:active { transform: scale(0.96); }

        .signature-pad {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            background: var(--slate-950);
            height: 100px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .device-row:nth-child(even) { background: rgba(255,255,255,0.02); }
        
        .summary-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 1.5rem;
        }

        .sans-section-header {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--kharon-gold);
            opacity: 0.8;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(250, 204, 21, 0.1);
            border-top-color: var(--kharon-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Variants */
        .toast-success { border-left: 4px solid #22c55e; }
        .toast-error { border-left: 4px solid #ef4444; }
        .toast-warning { border-left: 4px solid #f59e0b; }
        .toast-info { border-left: 4px solid #3b82f6; }

        /* Mobile Navigation */
        .mobile-menu-btn {
            display: none;
        }
        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(4px);
            z-index: 30;

            .mobile-menu-btn {

                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                width: 85%;

            #sidebar.open {
                left: 0;
            }
            .mobile-overlay.active {
                display: block;
            }

            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .empty-state i {
            opacity: 0.3;
            margin-bottom: 1rem;
        }

    <script>
        const state = {
            currentNav: 0,
            activeJobId: 'K-2402',
            safetyVerified: false,
            laborState: 'idle', 
            workStartTime: null,
            jobs: [
                { 
                    id: 'K-2402', 
                    client: 'Global Logistics', 
                    site: 'Control Room', 
                    address: 'Waterfront Office Park, Somerset West',
                    contact: 'Sarah Jenkins (082-555-1234)',
                    type: 'SANS 10139 Detection Service', 
                    status: 'In Progress', 
                    po: 'PO-102', 
                    timeIn: '08:45', 
                    devices: 32,
                    instruction: 'Annual maintenance. Client reports intermittent "Loop Open" faults on Zone 4. Inspect cable integrity.'
                },
                { 
                    id: 'K-2401', 
                    client: 'Industrial A', 
                    site: 'Data Center B', 
                    address: '14 Helium Road, Brackenfell',
                    contact: 'Mike Ross (021-999-8877)',
                    type: 'SANS 14520 Gas Maintenance', 
                    status: 'Scheduled', 
                    po: 'PO-882', 
                    timeIn: '--:--', 
                    devices: 14,
                    instruction: 'Cylinder pressure verification and actuator test.'
                }
            ],
            vanStock: [
                { item: '12V 7Ah Standby Battery', qty: 4 },
                { item: 'Optical Smoke Detector B7', qty: 2 }
            ],
            lastSync: '12 mins ago'
        };

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function setNav(index) {
            state.currentNav = index;
            render();
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }
        function openModal(h) { 
            document.getElementById('modal-content').innerHTML = h; 
            document.getElementById('modal-container').classList.remove('hidden'); 
            lucide.createIcons(); 
        }

        function toggleLabor(mode) {
            if (mode === 'work' && state.laborState !== 'work') {
                state.workStartTime = new Date();
            }
            state.laborState = state.laborState === mode ? 'idle' : mode;
            showToast(`${mode.charAt(0).toUpperCase() + mode.slice(1)} Pulse Updated`);
            render();
        }

        function render() {
            const crumbs = ['My Schedule', 'Technical Standards', 'Site Intelligence', 'Material Manifest'];
            document.getElementById('current-page-crumb').innerText = crumbs[state.currentNav];
            
            [0,1,2,3].forEach(i => {
                const btn = document.getElementById(`nav-${i}`);
                if (btn) {
                    if (i === state.currentNav) {
                        btn.classList.add('sidebar-item-active', 'shadow-lg');
                        btn.classList.remove('text-white/30');
                    } else {
                        btn.classList.remove('sidebar-item-active', 'shadow-lg');
                        btn.classList.add('text-white/30');
                    }
                }
            });

            const content = document.getElementById('content-area');
            content.innerHTML = renderModule(state.currentNav);
            lucide.createIcons();
        }

        function renderModule(index) {
            switch(index) {
                case 0: return renderWorkOrders();
                case 1: return renderSOPs();
                case 2: return renderLayouts();
                case 3: return renderVanStock();
                default: return '';
            }
        }

        function renderWorkOrders() {
            const activeJob = state.jobs.find(j => j.id === state.activeJobId);
            const queue = state.jobs.filter(j => j.id !== state.activeJobId);

            return `
                <div class="space-y-10 animate-in pb-12">

                    console.warn('LocalStorage read error:', e);

                    console.warn('LocalStorage write error:', e);
                    return false;

            const savedNav = Storage.get('currentNav');
            if (savedNav !== null && typeof setNav === 'function') {
                setNav(savedNav);
            }
            
            // Initialize Tech Portal specific features
            updateOnlineStatus();
            initVanStock();
            renderSafetyChecklist();
            renderPhotoGrid();
        });

        // ===== SIGNATURE PAD IMPLEMENTATION =====
        let signatureCanvas = null;
        let signatureCtx = null;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        function initSignaturePad() {
            const canvas = document.getElementById('signature-canvas');
            if (!canvas) return;
            
            signatureCanvas = canvas;
            signatureCtx = canvas.getContext('2d');
            
            // Set canvas size for high DPI displays
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            signatureCtx.scale(dpr, dpr);
            
            // Style
            signatureCtx.strokeStyle = '#000';
            signatureCtx.lineWidth = 2;
            signatureCtx.lineCap = 'round';
            signatureCtx.lineJoin = 'round';
            
            // Mouse events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // Touch events
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);
        }

        function getPos(e) {
            const rect = signatureCanvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            signatureCtx.beginPath();
            signatureCtx.moveTo(lastX, lastY);
            signatureCtx.lineTo(pos.x, pos.y);
            signatureCtx.stroke();
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() { isDrawing = false; }

        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            isDrawing = true;
            const rect = signatureCanvas.getBoundingClientRect();
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = signatureCanvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            signatureCtx.beginPath();
            signatureCtx.moveTo(lastX, lastY);
            signatureCtx.lineTo(x, y);
            signatureCtx.stroke();
            lastX = x;
            lastY = y;
        }

        function clearSignature() {
            if (signatureCtx) {
                const rect = signatureCanvas.getBoundingClientRect();
                signatureCtx.clearRect(0, 0, rect.width, rect.height);
            }
        }

        function saveSignature() {
            if (!signatureCanvas) return;
            const signatureData = signatureCanvas.toDataURL('image/png');
            Storage.set('technician_signature', signatureData);
            showToast('Signature saved successfully', 'success');
            closeModal('signature-modal');
        }

        function openSignaturePad() {
            document.getElementById('signature-modal').classList.remove('hidden');
            document.getElementById('signature-modal').classList.add('flex');
            setTimeout(() => initSignaturePad(), 100);
            lucide.createIcons();
        }

        // ===== CAMERA INTEGRATION IMPLEMENTATION =====
        let cameraStream = null;
        let videoElement = null;

        async function initCamera() {
            videoElement = document.getElementById('camera-video');
            if (!videoElement) return;

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                videoElement.srcObject = cameraStream;
                showToast('Camera activated', 'info');
            } catch (err) {
                console.error('Camera access error:', err);
                showToast('Camera access denied. Please enable camera permissions.', 'error');
            }
        }

        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            if (videoElement) videoElement.srcObject = null;
            closeModal('camera-modal');
        }

        function capturePhoto() {
            if (!videoElement || !cameraStream) {
                showToast('Camera not initialized', 'error');
                return;
            }
            const canvas = document.getElementById('camera-canvas');
            const context = canvas.getContext('2d');
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            const photoData = canvas.toDataURL('image/jpeg', 0.85);
            const photos = Storage.get('technician_photos', []);
            const photoId = crypto.randomUUID ? crypto.randomUUID() : 'photo-' + Date.now();
            photos.push({ id: photoId, data: photoData, timestamp: new Date().toISOString() });
            Storage.set('technician_photos', photos);
            showToast('Photo captured successfully', 'success');
            stopCamera();
            renderPhotoGrid();
        }

        function openCamera() {
            document.getElementById('camera-modal').classList.remove('hidden');
            document.getElementById('camera-modal').classList.add('flex');
            setTimeout(() => initCamera(), 100);
            lucide.createIcons();
        }

        function renderPhotoGrid() {
            const grid = document.getElementById('photo-grid');
            if (!grid) return;
            const photos = Storage.get('technician_photos', []);
            if (photos.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-8 text-gray-500"><i data-lucide="camera-off" class="w-12 h-12 mx-auto mb-2 opacity-50"></i><p>No photos captured</p></div>';
            } else {
                grid.innerHTML = photos.map(photo => `
                    <div class="relative group aspect-square bg-gray-100 rounded-lg overflow-hidden">
                        <img src="${photo.data}" alt="Evidence photo" class="w-full h-full object-cover">
                        <button onclick="deletePhoto('${photo.id}')" type="button" class="absolute top-1 right-1 p-1.5 bg-red-500 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity" aria-label="Delete photo">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                        <div class="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-xs p-1">${new Date(photo.timestamp).toLocaleString()}</div>
                    </div>`).join('');
            }
            lucide.createIcons();
        }

        function deletePhoto(photoId) {
            const photos = Storage.get('technician_photos', []);
            Storage.set('technician_photos', photos.filter(p => p.id !== photoId));
            renderPhotoGrid();
            showToast('Photo deleted', 'info');
        }

        // ===== OFFLINE/ONLINE DETECTION =====
        function updateOnlineStatus() {
            const indicator = document.getElementById('online-indicator');
            const statusText = document.getElementById('status-text');
            if (!indicator || !statusText) return;
            if (navigator.onLine) {
                indicator.className = 'w-3 h-3 bg-green-500 rounded-full animate-pulse';
                statusText.textContent = 'Online';
                statusText.className = 'text-xs text-green-600 font-medium';
            } else {
                indicator.className = 'w-3 h-3 bg-red-500 rounded-full';
                statusText.textContent = 'Offline';
                statusText.className = 'text-xs text-red-600 font-medium';
                showToast('You are offline. Changes will sync when connection is restored.', 'warning');
            }
        }
        window.addEventListener('online', () => { updateOnlineStatus(); showToast('Connection restored. Syncing data...', 'success'); });
        window.addEventListener('offline', () => { updateOnlineStatus(); });

        // ===== LABOR STATE TRACKING =====
        let laborTimer = null;
        let laborStartTime = null;
        let laborElapsed = 0;

        function startLaborTracking(jobId) {
            if (laborTimer) return;
            laborStartTime = Date.now();
            const savedState = Storage.get('labor_state', {});
            if (savedState[jobId]) laborElapsed = savedState[jobId].elapsed || 0;
            updateLaborDisplay();
            laborTimer = setInterval(() => {
                laborElapsed = Math.floor((Date.now() - laborStartTime) / 1000) + (savedState[jobId]?.elapsed || 0);
                updateLaborDisplay();
                if (laborElapsed % 10 === 0) Storage.set('labor_state', { [jobId]: { elapsed: laborElapsed, startTime: laborStartTime } });
            }, 1000);
            showToast('Labor tracking started', 'info');
        }

        function stopLaborTracking(jobId) {
            if (laborTimer) {
                clearInterval(laborTimer);
                laborTimer = null;
                const savedState = Storage.get('labor_state', {});
                savedState[jobId] = { elapsed: laborElapsed, endTime: new Date().toISOString(), completed: true };
                Storage.set('labor_state', savedState);
                laborElapsed = 0;
                laborStartTime = null;
                updateLaborDisplay();
                showToast('Labor tracking stopped. Time logged.', 'success');
            }
        }

        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateLaborDisplay() {
            const display = document.getElementById('labor-timer');
            if (display) display.textContent = formatTime(laborElapsed);
        }

        // ===== SAFETY VERIFICATION CHECKLIST =====
        const safetyChecklist = [
            { id: 'ppe', label: 'PPE worn (helmet, gloves, boots, glasses)' },
            { id: 'lockout', label: 'Lock-out/Tag-out verified' },
            { id: 'permits', label: 'Work permits obtained' },
            { id: 'hazards', label: 'Area hazards identified' },
            { id: 'tools', label: 'Tools inspected and functional' },
            { id: 'emergency', label: 'Emergency procedures reviewed' }
        ];

        function renderSafetyChecklist() {
            const container = document.getElementById('safety-checklist');
            if (!container) return;
            const savedChecks = Storage.get('safety_checks', {});
            container.innerHTML = `<div class="space-y-3">${safetyChecklist.map(item => `
                <label class="flex items-start gap-3 p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors">
                    <input type="checkbox" id="safety-${item.id}" class="mt-0.5 w-5 h-5 text-blue-600 rounded focus:ring-blue-500" ${savedChecks[item.id] ? 'checked' : ''} onchange="toggleSafetyCheck('${item.id}')">
                    <span class="text-sm text-gray-700">${item.label}</span>
                </label>`).join('')}</div>
                <div class="mt-4 p-3 bg-yellow-50 border border-yellow-200 rounded">
                    <p class="text-sm text-yellow-800"><i data-lucide="alert-triangle" class="w-4 h-4 inline mr-1"></i>All items must be checked before proceeding with work.</p>
                </div>`;
            lucide.createIcons();
        }

        function toggleSafetyCheck(id) {
            const checks = Storage.get('safety_checks', {});
            checks[id] = document.getElementById(`safety-${id}`).checked;
            Storage.set('safety_checks', checks);
            if (safetyChecklist.every(item => checks[item.id])) showToast('Safety verification complete. You may proceed.', 'success');
        }

        function verifySafetyComplete() {
            const checks = Storage.get('safety_checks', {});
            if (!safetyChecklist.every(item => checks[item.id])) {
                showToast('Please complete all safety checks before proceeding', 'error');
                return false;
            }
            return true;
        }

        // ===== VAN STOCK MANAGEMENT =====
        const defaultStock = [
            { id: 'cable-cat6', name: 'CAT6 Cable (305m box)', quantity: 2, minLevel: 1, unit: 'box' },
            { id: 'connector-rj45', name: 'RJ45 Connectors', quantity: 50, minLevel: 20, unit: 'pcs' },
            { id: 'switch-8port', name: '8-Port Network Switch', quantity: 3, minLevel: 2, unit: 'unit' },
            { id: 'patch-panel', name: '24-Port Patch Panel', quantity: 2, minLevel: 1, unit: 'unit' },
            { id: 'fiber-patch', name: 'Fiber Patch Cable LC-LC', quantity: 10, minLevel: 5, unit: 'pcs' },
            { id: 'conduit-25mm', name: 'Conduit 25mm (coil)', quantity: 3, minLevel: 2, unit: 'coil' }
        ];

        function initVanStock() {
            const stock = Storage.get('van_stock', defaultStock);
            Storage.set('van_stock', stock);
            renderVanStock();
            checkLowStock();
        }

        function renderVanStock() {
            const container = document.getElementById('van-stock-list');
            if (!container) return;
            const stock = Storage.get('van_stock', defaultStock);
            container.innerHTML = stock.map(item => {
                const isLow = item.quantity <= item.minLevel;
                return `<div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg ${isLow ? 'border-2 border-red-300 bg-red-50' : ''}">
                    <div><p class="font-medium text-sm">${item.name}</p><p class="text-xs text-gray-500">Min: ${item.minLevel} ${item.unit}</p></div>
                    <div class="flex items-center gap-2">
                        <button onclick="adjustStock('${item.id}', -1)" class="w-8 h-8 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded transition-colors" aria-label="Decrease quantity"><i data-lucide="minus" class="w-4 h-4"></i></button>
                        <span class="w-12 text-center font-semibold ${isLow ? 'text-red-600' : ''}">${item.quantity}</span>
                        <button onclick="adjustStock('${item.id}', 1)" class="w-8 h-8 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded transition-colors" aria-label="Increase quantity"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function adjustStock(itemId, delta) {
            const stock = Storage.get('van_stock', defaultStock);
            const item = stock.find(s => s.id === itemId);
            if (item) {
                item.quantity = Math.max(0, item.quantity + delta);
                Storage.set('van_stock', stock);
                renderVanStock();
                checkLowStock();
            }
        }

        function checkLowStock() {
            const stock = Storage.get('van_stock', defaultStock);
            const lowItems = stock.filter(s => s.quantity <= s.minLevel);
            if (lowItems.length > 0) showToast(`Low stock alert: ${lowItems.map(i => i.name).join(', ')}`, 'warning');
        }

    </script>
</body>
